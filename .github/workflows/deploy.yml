name: Build and deploy
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build reboot game
        working-directory: reboot
        run: |
          bun install
          bun test
          bun run typecheck
          bun run build
          mkdir -p ../static/reboot
          cp index.html style.css dist/game.js ../static/reboot/

      - name: Build and deploy Zola site
        if: github.event_name == 'push'
        uses: shalzz/zola-deploy-action@master
        env:
          PAGES_BRANCH: gh-pages
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
